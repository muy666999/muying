<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>看美女</title>
<style type="text/css">
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Microsoft Yahei", sans-serif;
}
body{
    background-color: #f8f8f8;
    padding: 10px;
}
.title-tip{
    text-align: center;
    font-size: 18px;
    color: #d83838;
    margin: 12px 0;
    font-weight: 500;
}
#main{
    width: 100%;
}
video{
    width: 100%;
    height: 400px;
    display: block;
}
#buttons{
    text-align: center;
    margin-top: 15px;
}
#switch, #more, #next{
    background: linear-gradient(to bottom, #FF2,#FB0);
    color: #AF2E08;
    font-size: 16px;
    font-weight: bold;
    height: 28px;
    padding: 0 20px;
    margin: 0 5px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
}
</style>
</head>
<body>
    <p class="title-tip">每天看小姐姐预防老年痴呆</p>
    <section id="main">
        <video width="100%" height="400px" id="player" src="" controls webkit-playsinline playsinline poster="/content/uploadfile/tpl_options//logopic.png" preload="auto"></video>
    </section>
    <section id="buttons">
        <button id="switch">连续: 关</button>
        <button id="next">播放下一个</button>
        <button id="more" onclick="window.open('https://www.baidu.com/')">前往百度</button>
    </section>

<script>
(function(window, document) {
    if (top != self) {
        window.top.location.replace(self.location.href);
    }
    var get = function(id) {
        return document.getElementById(id);
    }
    var bind = function(element, event, callback) {
        return element.addEventListener(event, callback);
    }
    var auto = false;
    var player = get('player');
    var randomm = function() {
        player.src = 'http://v.nrzj.vip/video.php?_t=' + Math.random();
        player.volume = 0.2;
        player.play();
    }
    window.addEventListener('DOMContentLoaded', randomm);
    bind(get('next'), 'click', randomm);
    bind(player, 'error', randomm);
    bind(get('switch'), 'click', function() {
        auto = !auto;
        this.innerText = '连续: ' + (auto ? '开' : '关');
    });
    bind(player, 'ended', function() {
        if (auto) randomm();
    });
})(window, document);
</script>
</body>
</html>
