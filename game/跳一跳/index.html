<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>跳一跳 Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <style>
    * {margin: 0; padding: 0; box-sizing: border-box;}
    body {overflow: hidden; background: #f5f5f5;}

    .top-restart {
      position: fixed;
      /* 安全位置：既不挡游戏，也避开底部浏览器死区 */
      bottom: 180px;
      left: 50%;
      transform: translateX(-50%);
      width: 25%;
      padding: 10px 0;
      border-radius: 50px;
      background: #e8f0fe;
      color: #4080ff;
      font-size: 16px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      z-index: 9999;
      box-shadow: 0 2px 8px rgba(64,128,255,0.15);
      transition: 0.2s;
      /* 手机端关键：防止长按菜单、文本选中、点击穿透 */
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      touch-action: manipulation;
    }
    .top-restart:hover {
      background: #d7e4fb;
    }
  </style>
</head>
<body>
<button class="top-restart" id="restartBtn">🔄 再来一次</button>

<script src="main.d0b7f22153f91844d442.js"></script>
<script>
function restartGame(){
  location.reload();
}

// 手机端必须用 addEventListener 绑定事件，比 onclick 更稳定
const restartBtn = document.getElementById('restartBtn');
restartBtn.addEventListener('click', restartGame);
restartBtn.addEventListener('touchend', function(e){
  e.preventDefault();
  restartGame();
});

// 初始化音频
const startAudio = new Audio("qibu.MP3");
const loopAudio = new Audio("xunhuan.MP3");
const endAudio = new Audio("jieshu.MP3");
loopAudio.loop = true;
startAudio.load();
loopAudio.load();
endAudio.load();

let isPressing = false;

function pressStart() {
  if(isPressing) return;
  isPressing = true;
  startAudio.pause();
  startAudio.currentTime = 0;
  startAudio.play().catch(()=>{});

  startAudio.onended = function(){
    if(!isPressing) return;
    loopAudio.pause();
    loopAudio.currentTime = 0;
    loopAudio.play().catch(()=>{});
  }
}

function pressEnd() {
  if(!isPressing) return;
  isPressing = false;
  startAudio.pause();
  loopAudio.pause();
  startAudio.currentTime = 0;
  loopAudio.currentTime = 0;
  endAudio.currentTime = 0;
  endAudio.play().catch(()=>{});
}

document.addEventListener('mousedown', pressStart);
document.addEventListener('mouseup', pressEnd);
document.addEventListener('mouseleave', pressEnd);

document.addEventListener('touchstart', e=>{
  e.preventDefault();
  pressStart();
});
document.addEventListener('touchend', e=>{
  e.preventDefault();
  pressEnd();
});
document.addEventListener('touchcancel', pressEnd);
</script>
</body>
</html>
