<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>跳一跳 Demo</title>
  <!-- 关键：加 viewport-fit=cover -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <style>
    * {margin: 0; padding: 0; box-sizing: border-box;}
    body {overflow: hidden; background: #f5f5f5;}

    .top-restart {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      /* 重点：自动避开 iOS/安卓底部安全区 */
      padding: 18px 0 calc(18px + env(safe-area-inset-bottom, 0px));
      border-radius: 0;
      background: #e8f0fe;
      color: #4080ff;
      font-size: 18px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      z-index: 9999;
      box-shadow: 0 -2px 8px rgba(64,128,255,0.15);
    }
  </style>
</head>
<body>
<button class="top-restart" onclick="restartGame()">🔄 再来一次</button>

<script src="main.d0b7f22153f91844d442.js"></script>
<script>
function restartGame(){
  location.reload();
}

const startAudio = new Audio("qibu.MP3");
const loopAudio = new Audio("xunhuan.MP3");
const endAudio = new Audio("jieshu.MP3");
loopAudio.loop = true;
startAudio.load();
loopAudio.load();
endAudio.load();

let isPressing = false;

function pressStart() {
  if(isPressing) return;
  isPressing = true;
  startAudio.pause();
  startAudio.currentTime = 0;
  startAudio.play().catch(()=>{});

  startAudio.onended = function(){
    if(!isPressing) return;
    loopAudio.pause();
    loopAudio.currentTime = 0;
    loopAudio.play().catch(()=>{});
  }
}

function pressEnd() {
  if(!isPressing) return;
  isPressing = false;
  startAudio.pause();
  loopAudio.pause();
  startAudio.currentTime = 0;
  loopAudio.currentTime = 0;
  endAudio.currentTime = 0;
  endAudio.play().catch(()=>{});
}

document.addEventListener('mousedown', pressStart);
document.addEventListener('mouseup', pressEnd);
document.addEventListener('mouseleave', pressEnd);

document.addEventListener('touchstart', e=>{
  e.preventDefault();
  pressStart();
});
document.addEventListener('touchend', e=>{
  e.preventDefault();
  pressEnd();
});
document.addEventListener('touchcancel', pressEnd);
</script>
</body>
</html>
