<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>跳一跳 Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * {margin: 0; padding: 0; box-sizing: border-box;}
    body {overflow: hidden; background: #f5f5f5;}

    .top-restart {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 28px;
      border-radius: 50px;
      background: #e8f0fe;
      color: #4080ff;
      font-size: 16px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      z-index: 9999;
      box-shadow: 0 2px 8px rgba(64,128,255,0.15);
      transition: 0.2s;
    }
    .top-restart:hover {
      background: #d7e4fb;
    }
  </style>
</head>
<body>
<button class="top-restart" onclick="restartGame()">🔄 再来一次</button>
<script src="main.d0b7f22153f91844d442.js"></script>
<script>
function restartGame(){
  location.reload();
}
</script>
</body>
</html>
