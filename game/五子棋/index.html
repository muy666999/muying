<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>五子棋</title>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: #0a0a0a;
    color: #eee;
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    user-select: none;
    overflow-x: hidden;
    background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
    min-height: 100vh;
    padding: 10px;
  }

  .particles {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: -1;
    overflow: hidden;
  }
  
  .particle {
    position: absolute;
    width: 3px;
    height: 3px;
    background: rgba(255,77,77,0.4);
    border-radius: 50%;
    top: 100vh;
    animation: float 15s infinite linear;
  }
  
  @keyframes float {
    0% { transform: translateY(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-100vh); opacity: 0; }
  }

  .container {
    width: 100%;
    max-width: 450px;
    margin: 0 auto;
    padding: 10px 0;
  }
  
  .header {
    padding: 10px 0;
  }
  
  h1 {
    font-size: 24px;
    color: #ff4d4d;
    text-shadow: 0 0 15px rgba(255,77,77,0.7);
  }

  #board {
    width: 100%;
    height: auto;
    aspect-ratio: 1/1;
    background: #e3cd96;
    display: block;
    margin: 0 auto;
    border-radius: 4px;
    touch-action: manipulation;
  }

  .controls {
    margin-top: 15px;
  }
  
  button {
    padding: 12px 25px;
    border-radius: 6px;
    border: none;
    background: linear-gradient(135deg, #10b981, #047857);
    color: #fff;
    font-weight: bold;
    font-size: 16px;
  }

  .win-animation {
    animation: win 0.5s ease-out;
  }
  
  @keyframes win {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
  }
</style>
</head>
<body>
  <div class="particles" id="particles"></div>

  <div class="container">
    <div class="header">
      <h1>五子棋</h1>
    </div>
    <canvas id="board" width="450" height="450"></canvas>
    <div class="controls">
      <button id="btnRestart">重新开始</button>
    </div>
  </div>

<script>
(function(){
const SIZE = 15;
const CELL = 30;

const AI_CONFIG = {
  timeLimit: 800,
  maxDepth: 4,
  searchCount: 10,
  useKillerHeuristic: true,
  useTranspositionTable: true,
  useHistoryHeuristic: true,
  useThreatDetection: true,
  threatResponseMultiplier: 1,
  threatThreshold: 3
};

const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
const btnRestart = document.getElementById('btnRestart');

let board = [];   
let history = []; 
let over = false;
let myTurn = true;
let winLine = [];

let deadline = 0;
let isTimeout = false;
let totalNodes = 0;
let currentDepth = 0;

let transpositionTable = {};
let killerMoves = Array.from({length: 20}, () => [null, null]);
let historyTable = Array.from({length: SIZE}, () => Array(SIZE).fill(0));

const SCORE = {
  FIVE: 100000,
  FOUR_LIVE: 10000,
  FOUR_DEAD: 1000,
  THREE_LIVE: 1000,
  THREE_DEAD: 100,
  TWO_LIVE: 100,
  TWO_DEAD: 10,
  ONE: 1,
};

function inBoard(x,y){ return x>=0 && x<SIZE && y>=0 && y<SIZE; }

function checkWin(x,y,role, bd){
  const ds = [[1,0],[0,1],[1,1],[1,-1]];
  for(const d of ds){
    let count = 1;
    for(let i=1;i<5;i++){
      const nx=x+d[0]*i, ny=y+d[1]*i;
      if(inBoard(nx,ny) && bd[nx][ny]===role) count++; else break;
    }
    for(let i=1;i<5;i++){
      const nx=x-d[0]*i, ny=y-d[1]*i;
      if(inBoard(nx,ny) && bd[nx][ny]===role) count++; else break;
    }
    if(count>=5) return true;
  }
  return false;
}

function evalDirection(x, y, dx, dy, role) {
  let count = 1;
  let empty = 0;
  let block = 0;
  
  for(let i=1; i<=4; i++) {
    const nx = x + dx*i, ny = y + dy*i;
    if(!inBoard(nx,ny)) { block++; break; }
    if(board[nx][ny] === role) count++;
    else if(board[nx][ny] === 0) { empty++; break; }
    else { block++; break; }
  }
  for(let i=1; i<=4; i++) {
    const nx = x - dx*i, ny = y - dy*i;
    if(!inBoard(nx,ny)) { block++; break; }
    if(board[nx][ny] === role) count++;
    else if(board[nx][ny] === 0) { empty++; break; }
    else { block++; break; }
  }
  
  if(count >=5) return SCORE.FIVE;
  if(count ===4) {
    if(empty >=1) return SCORE.FOUR_LIVE;
    return SCORE.FOUR_DEAD;
  }
  if(count ===3) {
    if(empty >=2) return SCORE.THREE_LIVE;
    return SCORE.THREE_DEAD;
  }
  if(count ===2) {
    if(empty >=2) return SCORE.TWO_LIVE;
    return SCORE.TWO_DEAD;
  }
  return 0;
}

function evalPoint(x, y, role) {
  if(board[x][y] !== 0) return 0;
  let score = 0;
  const dirs = [[1,0],[0,1],[1,1],[1,-1]];
  for(const d of dirs) score += evalDirection(x,y,d[0],d[1],role);
  
  const opp = role===1?2:1;
  for(const d of dirs) score += evalDirection(x,y,d[0],d[1],opp) * 0.8;
  
  const cx = Math.abs(x-7), cy = Math.abs(y-7);
  score += (10 - cx - cy);
  return score;
}

function evaluateBoard(role) {
  let s = 0;
  for(let x=0;x<SIZE;x++){
    for(let y=0;y<SIZE;y++){
      if(board[x][y] === role) s += evalPoint(x,y,role);
      else if(board[x][y] !==0) s -= evalPoint(x,y,3-role);
    }
  }
  return s;
}

function getCandidates(role) {
  let c = [];
  let has = false;
  for(let i=0;i<SIZE;i++)for(let j=0;j<SIZE;j++)if(board[i][j]!==0){has=true;break;}
  if(!has) return [{x:7,y:7,s:999}];
  
  let v = new Set();
  for(let x=0;x<SIZE;x++){
    for(let y=0;y<SIZE;y++){
      if(board[x][y]!==0){
        for(let dx=-1;dx<=1;dx++){
          for(let dy=-1;dy<=1;dy++){
            let nx=x+dx, ny=y+dy;
            if(inBoard(nx,ny)&&board[nx][ny]===0&&!v.has(nx+','+ny)){
              v.add(nx+','+ny);
              let sc = evalPoint(nx,ny,role);
              c.push({x:nx,y:ny,s:sc});
            }
          }
        }
      }
    }
  }
  return c.sort((a,b)=>b.s-a.s);
}

function negamax(depth, alpha, beta, role) {
  totalNodes++;
  if((totalNodes&255)===0 && Date.now()>deadline){isTimeout=true;return 0;}
  
  let hash = createBoardHash();
  if(transpositionTable[hash]){
    let e=transpositionTable[hash];
    if(e.d>=depth){
      if(e.f==='exact')return e.v;
      if(e.f==='low')alpha=Math.max(alpha,e.v);
      else beta=Math.min(beta,e.v);
      if(alpha>=beta)return e.v;
    }
  }
  
  if(depth<=0) return evaluateBoard(role);
  let cands = getCandidates(role);
  let cnt = Math.min(cands.length, AI_CONFIG.searchCount);
  let best = -9999999;
  
  for(let i=0;i<cnt;i++){
    let m = cands[i];
    board[m.x][m.y]=role;
    let val;
    if(checkWin(m.x,m.y,role,board)) val = SCORE.FIVE;
    else val = -negamax(depth-1,-beta,-alpha,3-role);
    board[m.x][m.y]=0;
    if(isTimeout)return 0;
    if(val>best)best=val;
    if(best>alpha)alpha=best;
    if(alpha>=beta)break;
  }
  
  transpositionTable[hash]={v:best,d:depth,f:alpha>=beta?'cut':'exact'};
  return best;
}

function createBoardHash(){
  let h='';
  for(let x=0;x<SIZE;x++)for(let y=0;y<SIZE;y++)h+=board[x][y];
  return h;
}

function findBestMove() {
  let cands = getCandidates(2);
  
  for(let m of cands){
    board[m.x][m.y]=2;
    if(checkWin(m.x,m.y,2,board)){board[m.x][m.y]=0;return m;}
    board[m.x][m.y]=0;
  }
  
  for(let m of cands){
    board[m.x][m.y]=1;
    if(checkWin(m.x,m.y,1,board)){board[m.x][m.y]=0;return m;}
    board[m.x][m.y]=0;
  }
  
  totalNodes=0; isTimeout=false;
  deadline=Date.now()+AI_CONFIG.timeLimit;
  currentDepth=AI_CONFIG.maxDepth;
  
  let best = cands[0];
  let max = -9999999;
  
  for(let m of cands.slice(0,AI_CONFIG.searchCount)){
    board[m.x][m.y]=2;
    let v = -negamax(currentDepth-1, -9999999,9999999,1);
    board[m.x][m.y]=0;
    if(isTimeout)break;
    if(v>max){max=v;best=m;}
  }
  
  return best;
}

function doMove(x,y,role){
  if(board[x][y]!==0)return false;
  board[x][y]=role;
  history.push({x,y,role});
  draw();
  
  if(checkWin(x,y,role,board)){
    over=true;
    const ds=[[1,0],[0,1],[1,1],[1,-1]];
    for(let d of ds){
      let arr=[{x,y}];
      for(let i=1;i<5;i++){let nx=x+d[0]*i,ny=y+d[1]*i;if(inBoard(nx,ny)&&board[nx][ny]===role)arr.push({x:nx,y:ny});else break;}
      for(let i=1;i<5;i++){let nx=x-d[0]*i,ny=y-d[1]*i;if(inBoard(nx,ny)&&board[nx][ny]===role)arr.unshift({x:nx,y:ny});else break;}
      if(arr.length>=5){winLine=arr;break;}
    }
    draw();
    canvas.classList.add('win-animation');
    setTimeout(()=>canvas.classList.remove('win-animation'),500);
    return true;
  }
  
  if(history.length>=SIZE*SIZE){
    over=true;
    return true;
  }
  return false;
}

function aiRound(){
  if(over)return;
  
  setTimeout(()=>{
    let move=findBestMove();
    if(move && board[move.x][move.y]===0) doMove(move.x,move.y,2);
    if(!over) myTurn=true;
  }, 200);
}

function handleInput(e){
  if(over||!myTurn)return;
  const r=canvas.getBoundingClientRect();
  const scale = canvas.width / r.width;
  const x=Math.floor((e.clientX-r.left)*scale/CELL);
  const y=Math.floor((e.clientY-r.top)*scale/CELL);
  if(!inBoard(x,y)||board[x][y]!==0) return;
  
  if(doMove(x,y,1))return;
  myTurn=false;
  aiRound();
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle="#888";ctx.lineWidth=1;
  ctx.beginPath();
  for(let i=0;i<SIZE;i++){
    ctx.moveTo(15+i*30,15);ctx.lineTo(15+i*30,435);
    ctx.moveTo(15,15+i*30);ctx.lineTo(435,15+i*30);
  }
  ctx.stroke();
  
  [3,7,11].forEach(a=>[3,7,11].forEach(b=>{
    ctx.beginPath();ctx.arc(15+a*30,15+b*30,3,0,7);ctx.fill();
  }));
  
  board.forEach((r,x)=>r.forEach((p,y)=>{
    if(p===0)return;
    ctx.beginPath();ctx.arc(15+x*30,15+y*30,13,0,7);
    if(p===1)ctx.fillStyle="#000";else ctx.fillStyle="#fff";
    ctx.fill();ctx.stroke();
  }));
  
  if(history.length){
    let last=history[history.length-1];
    ctx.strokeStyle=last.role===1?"#4df":"#f44";ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(15+last.x*30-5,15+last.y*30);
    ctx.lineTo(15+last.x*30+5,15+last.y*30);
    ctx.moveTo(15+last.x*30,15+last.y*30-5);
    ctx.lineTo(15+last.x*30,15+last.y*30+5);
    ctx.stroke();
  }
  
  if(winLine.length){
    ctx.strokeStyle="rgba(255,0,0,0.8)";ctx.lineWidth=4;
    ctx.beginPath();
    ctx.moveTo(15+winLine[0].x*30,15+winLine[0].y*30);
    ctx.lineTo(15+winLine[winLine.length-1].x*30,15+winLine[winLine.length-1].y*30);
    ctx.stroke();
  }
}

function createParticles() {
  const particlesContainer = document.getElementById('particles');
  particlesContainer.innerHTML = '';
  for(let i = 0; i < 30; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    particle.style.left = Math.random() * 100 + 'vw';
    particle.style.animationDelay = Math.random() * 15 + 's';
    particle.style.animationDuration = (15 + Math.random() * 10) + 's';
    particlesContainer.appendChild(particle);
  }
}

function init(){
  board=Array.from({length:SIZE},()=>Array(SIZE).fill(0));
  history=[];over=false;myTurn=true;winLine=[];
  transpositionTable={};
  draw();
}

canvas.addEventListener('click',handleInput);
btnRestart.addEventListener('click',init);

init();
createParticles();
})();
</script>
</body>
</html>
