<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>五子棋</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
    font-family: sans-serif;
    text-align: center;
    user-select: none;
    overflow-x: hidden;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 10px;
  }

  .particles {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: -1;
    overflow: hidden;
  }
  
  .particle {
    position: absolute;
    width: 3px;
    height: 3px;
    background: rgba(255,77,77,0.4);
    border-radius: 50%;
    top: 100%;
    animation: float 12s infinite linear;
  }
  
  @keyframes float {
    0% { transform: translateY(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-100vh); opacity: 0; }
  }

  .title {
    font-size: 22px;
    color: #ff4d4d;
    margin-bottom: 12px;
    text-shadow: 0 0 10px #ff4d4d;
  }

  #board {
    width: 90vw;
    max-width: 380px;
    height: 90vw;
    max-height: 380px;
    background: #e3cd96;
    border-radius: 6px;
    touch-action: manipulation;
  }

  .btn-restart {
    margin-top: 16px;
    padding: 10px 22px;
    background: #10b981;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: bold;
  }

  .win-animation {
    animation: win 0.5s;
  }

  @keyframes win {
    0% { transform: scale(1); }
    50% { transform: scale(1.04); }
    100% { transform: scale(1); }
  }
</style>
</head>

<body>
<div class="particles" id="particles"></div>

<div class="title">五子棋</div>
<canvas id="board"></canvas>
<button class="btn-restart" id="restart">重新开始</button>

<script>
const SIZE = 15;
let canvas = document.getElementById('board');
let ctx = canvas.getContext('2d');
let restartBtn = document.getElementById('restart');
let particles = document.getElementById('particles');

let board, over, myTurn, winLine;

function resizeCanvas() {
  let size = Math.min(380, window.innerWidth * 0.9);
  canvas.width = size;
  canvas.height = size;
  window.CELL = size / SIZE;
  draw();
}

function init() {
  board = Array.from({length:SIZE},()=>Array(SIZE).fill(0));
  over = false;
  myTurn = true;
  winLine = [];
  draw();
}

function inBoard(x,y) { return x>=0&&x<SIZE&&y>=0&&y<SIZE; }

function checkWin(x,y,role) {
  const dirs = [[1,0],[0,1],[1,1],[1,-1]];
  for(let [dx,dy] of dirs) {
    let c = 1;
    for(let i=1;i<5;i++){let nx=x+dx*i,ny=y+dy*i;if(inBoard(nx,ny)&&board[nx][ny]===role)c++;else break;}
    for(let i=1;i<5;i++){let nx=x-dx*i,ny=y-dy*i;if(inBoard(nx,ny)&&board[nx][ny]===role)c++;else break;}
    if(c>=5) return true;
  }
  return false;
}

function draw() {
  let w = canvas.width;
  ctx.clearRect(0,0,w,w);
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 1;

  for(let i=0;i<=SIZE;i++){
    let p = i*CELL;
    ctx.beginPath();
    ctx.moveTo(p,0); ctx.lineTo(p,w); ctx.stroke();
    ctx.moveTo(0,p); ctx.lineTo(w,p); ctx.stroke();
  }

  for(let x=0;x<SIZE;x++){
    for(let y=0;y<SIZE;y++){
      if(board[x][y]===0) continue;
      ctx.beginPath();
      ctx.arc(x*CELL+CELL/2, y*CELL+CELL/2, CELL*0.4,0,7);
      ctx.fillStyle = board[x][y]===1 ? '#000':'#fff';
      ctx.fill();
      ctx.stroke();
    }
  }
}

function put(x,y) {
  if(over||!myTurn||board[x][y]!==0) return;
  board[x][y] = 1;
  draw();
  if(checkWin(x,y,1)){over=true;return;}
  myTurn = false;
  setTimeout(aiMove,200);
}

function aiMove() {
  let best = null;
  let max = -1;
  for(let x=0;x<SIZE;x++){
    for(let y=0;y<SIZE;y++){
      if(board[x][y]!==0) continue;
      let s = Math.random();
      if(s>max){max=s;best={x,y};}
    }
  }
  if(best){
    board[best.x][best.y] = 2;
    draw();
    if(checkWin(best.x,best.y,2)) over=true;
  }
  myTurn = true;
}

canvas.addEventListener('click',(e)=>{
  let r = canvas.getBoundingClientRect();
  let x = Math.floor((e.clientX - r.left)/CELL);
  let y = Math.floor((e.clientY - r.top)/CELL);
  if(inBoard(x,y)) put(x,y);
});

restartBtn.onclick = () => { init(); };

function createParticles() {
  particles.innerHTML = '';
  for(let i=0;i<30;i++){
    let p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random()*100+'vw';
    p.style.animationDelay = Math.random()*10+'s';
    particles.appendChild(p);
  }
}

window.addEventListener('resize', resizeCanvas);
resizeCanvas();
init();
createParticles();
</script>
</body>
</html>
